<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Factory ERP AI</title>

<style>
:root{
 --bg:#0f172a;
 --card:#1e293b;
 --user:#2563eb;
 --bot:#334155;
 --accent:#22c55e;
}

/* ===== BODY ===== */
body{
 margin:0;
 font-family:Segoe UI,Tahoma,Verdana;
 background:var(--bg);
 color:#fff;
 height:100vh;
 height:100dvh;
 overflow:hidden;
 display:flex;
 flex-direction:column;
}

/* ===== FIXED HEADER ===== */
header{
 position:fixed;
 top:0;
 left:0;
 width:100%;
 background:var(--card);
 padding:15px;
 text-align:center;
 font-weight:bold;
 font-size:20px;
 z-index:9999;
 box-shadow:0 3px 10px rgba(0,0,0,.4);
}

/* ===== CHAT ===== */
#chat{
 margin-top:70px;
 flex:1;
 overflow-y:auto;
 padding:15px;
 padding-bottom:140px;
 display:flex;
 flex-direction:column;
 gap:12px;
}

.msg{
 max-width:85%;
 padding:12px 16px;
 border-radius:18px;
 white-space:pre-wrap;
 font-size:15px;
}

.user{
 align-self:flex-end;
 background:var(--user);
}

.bot{
 align-self:flex-start;
 background:var(--bot);
 border:1px solid #475569;
}

/* ===== FOOTER ===== */
footer{
 position:fixed;
 bottom:0;
 left:0;
 width:100%;
 background:var(--card);
 padding:12px 15px;
 display:flex;
 gap:10px;
 z-index:9999;
}

input{
 flex:1;
 padding:14px;
 border-radius:25px;
 border:1px solid #334155;
 background:#0f172a;
 color:white;
 font-size:16px;
 outline:none;
}

button{
 padding:12px 20px;
 border:none;
 border-radius:25px;
 background:var(--accent);
 font-weight:bold;
 cursor:pointer;
}

/* ===== SUGGESTIONS (APP SAFE) ===== */
#suggestions{
 position:fixed;
 bottom:85px;
 left:15px;
 right:15px;
 background:#1e293b;
 border:1px solid #334155;
 border-radius:12px;
 max-height:250px;
 overflow-y:auto;
 display:none;
 z-index:9998;
}

.suggest-item{
 padding:10px 14px;
 border-bottom:1px solid #334155;
 cursor:pointer;
}

.suggest-item:last-child{
 border-bottom:none;
}

.suggest-item:hover{
 background:#334155;
}

.highlight{
 color:#22c55e;
 font-weight:bold;
}
</style>
</head>

<body>

<header>🏭 34" Factory ERP AI</header>

<div id="chat">
<div class="msg bot">
ওস্তাদ, সিল নম্বর, তারিখ বা লট সাইজ লিখে রিপোর্ট দেখুন।
</div>
</div>

<footer>
<input id="q" placeholder="Type: 656 / 32330 / today">
<button onclick="send()">Send</button>
</footer>

<div id="suggestions"></div>

<script>

/* ===== BASE ===== */
var chat=document.getElementById("chat");
var input=document.getElementById("q");
var suggestionBox=document.getElementById("suggestions");

function add(text,type){
 var d=document.createElement("div");
 d.className="msg "+type;
 d.innerHTML=text;
 chat.appendChild(d);
 chat.scrollTop=chat.scrollHeight;
}

/* ===== MEMORY ===== */
var memory=JSON.parse(localStorage.getItem("erp_memory")||"[]");

function saveMemory(t){
 memory.unshift(t);
 memory=memory.filter(function(v,i,a){return a.indexOf(v)===i}).slice(0,10);
 localStorage.setItem("erp_memory",JSON.stringify(memory));
}

/* ===== STATIC COMMANDS ===== */
var baseCommands=[
"total dyeing","totall","today",
"cpb per day","jigger per day",
"napthol per day","singing per day",
"marcerise per day","bleach per day"
];

/* ===== RENDER SUGGEST ===== */
function renderSuggest(list,value){
 suggestionBox.innerHTML="";
 if(list.length===0){
  suggestionBox.style.display="none";
  return;
 }

 for(var i=0;i<list.length;i++){
  var div=document.createElement("div");
  div.className="suggest-item";
  div.innerHTML=list[i];
  div.onclick=function(){
   input.value=this.innerText;
   suggestionBox.style.display="none";
   input.focus();
  };
  suggestionBox.appendChild(div);
 }
 suggestionBox.style.display="block";
}

/* ===== SUGGEST ENGINE (NO ASYNC) ===== */
input.addEventListener("input",function(){

 var value=this.value.toLowerCase().trim();
 if(value===""){
  suggestionBox.style.display="none";
  return;
 }

 var list=[];

 /* Base */
 for(var i=0;i<baseCommands.length;i++){
  if(baseCommands[i].indexOf(value)!==-1){
   list.push(baseCommands[i]);
  }
 }

 /* Memory */
 for(var j=0;j<memory.length;j++){
  if(memory[j].toLowerCase().indexOf(value)!==-1){
   list.push(memory[j]);
  }
 }

 /* Sill detect */
 if(/^\d{3,}$/.test(value)){
  list.push("Search Sill "+value);
  list.push("Search Lot "+value);
 }

 list=list.filter(function(v,i,a){return a.indexOf(v)===i}).slice(0,8);

 renderSuggest(list,value);

});

/* ===== SEND ===== */
function send(){
 var text=input.value.trim();
 if(text==="") return;

 add(text,"user");
 saveMemory(text);
 input.value="";
 suggestionBox.style.display="none";

 fetch("/ask",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({question:text})
 })
 .then(function(res){return res.json();})
 .then(function(data){
  add(data.reply,"bot");
 })
 .catch(function(){
  add("⚠️ Server Error","bot");
 });
}

input.addEventListener("keypress",function(e){
 if(e.key==="Enter") send();
});

</script>

</body>
</html>
