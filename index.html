<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Factory ERP AI</title>

<style>
:root{
 --bg:#0f172a;
 --card:#1e293b;
 --user:#2563eb;
 --bot:#334155;
 --accent:#22c55e;
}

body{
 margin:0;
 font-family:Segoe UI;
 background:var(--bg);
 color:white;
 height:100vh;
 height:100dvh;
 display:flex;
 flex-direction:column;
 overflow:hidden;
}

/* ===== HEADER FIXED ===== */
header{
 position:fixed;
 top:0;
 left:0;
 width:100%;
 background:var(--card);
 padding:15px;
 text-align:center;
 font-weight:bold;
 font-size:20px;
 z-index:1000;
 box-shadow:0 2px 10px rgba(0,0,0,.4);
}

/* ===== CHAT AREA ===== */
#chat{
 margin-top:70px;
 flex:1;
 overflow-y:auto;
 padding:15px;
 padding-bottom:160px;
 display:flex;
 flex-direction:column;
 gap:12px;
}

/* ===== MESSAGE STYLE ===== */
.msg{
 max-width:85%;
 padding:14px 16px;
 border-radius:16px;
 white-space:pre-wrap;
 line-height:1.6;
 font-size:15px;
}

.user{
 align-self:flex-end;
 background:var(--user);
}

.bot{
 align-self:flex-start;
 background:var(--bot);
 border:1px solid #475569;
}

/* ===== SUGGESTION BOX ===== */
#suggestions{
 position:fixed;
 bottom:85px;
 left:15px;
 right:15px;
 background:#1e293b;
 border-radius:12px;
 border:1px solid #334155;
 display:none;
 max-height:200px;
 overflow-y:auto;
 z-index:999;
}

.suggest-item{
 padding:10px;
 border-bottom:1px solid #334155;
 cursor:pointer;
}

.suggest-item:last-child{
 border-bottom:none;
}

.suggest-item:hover{
 background:#334155;
}

/* ===== QUICK COMMAND BAR ===== */
#quickBar{
 position:fixed;
 bottom:60px;
 left:0;
 width:100%;
 overflow-x:auto;
 white-space:nowrap;
 padding:6px 10px;
}

.quick-btn{
 display:inline-block;
 background:#1e293b;
 padding:6px 14px;
 border-radius:20px;
 margin-right:8px;
 font-size:14px;
 cursor:pointer;
}

/* ===== FOOTER ===== */
footer{
 position:fixed;
 bottom:0;
 left:0;
 width:100%;
 background:var(--card);
 padding:10px;
 display:flex;
 gap:10px;
}

input{
 flex:1;
 padding:12px;
 border-radius:25px;
 border:none;
 outline:none;
 font-size:16px;
}

button{
 padding:10px 18px;
 border:none;
 border-radius:25px;
 background:var(--accent);
 font-weight:bold;
 cursor:pointer;
}
</style>
</head>

<body>

<header>🏭 34" Factory ERP AI</header>

<div id="chat">
<div class="msg bot">
ওস্তাদ, সিল নম্বর, তারিখ বা কমান্ড লিখুন।
</div>
</div>

<!-- Suggestion -->
<div id="suggestions"></div>

<!-- Quick Commands -->
<div id="quickBar">
<span class="quick-btn" onclick="quick('total dyeing')">total dyeing</span>
<span class="quick-btn" onclick="quick('today')">today</span>
<span class="quick-btn" onclick="quick('cpb per day')">cpb per day</span>
<span class="quick-btn" onclick="quick('jigger per day')">jigger per day</span>
<span class="quick-btn" onclick="quick('sill 590')">sill 590</span>
</div>

<footer>
<input id="q" placeholder="Type command...">
<button onclick="send()">Send</button>
</footer>

<script>
var chat=document.getElementById("chat");
var input=document.getElementById("q");
var suggestions=document.getElementById("suggestions");

var commands=[
"total dyeing","totall","today",
"cpb per day","jigger per day",
"napthol per day","singing per day",
"marcerise per day","bleach per day"
];

/* ===== ADD MESSAGE (FORMAT FIXED) ===== */
function add(text,type){
 var d=document.createElement("div");
 d.className="msg "+type;

 /* 🔥 newline ঠিক করবে */
 text = text.replace(/\n/g,"<br>");

 /* 🔥 bullet সুন্দর করবে */
 text = text.replace(/•/g,"<br>•");

 d.innerHTML=text;
 chat.appendChild(d);
 chat.scrollTop=chat.scrollHeight;
}

/* ===== SEND ===== */
function send(){
 var text=input.value.trim();
 if(text==="") return;

 add(text,"user");
 input.value="";
 suggestions.style.display="none";

 fetch("/ask",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({question:text})
 })
 .then(function(res){return res.json();})
 .then(function(data){
  add(data.reply,"bot");
 })
 .catch(function(){
  add("⚠️ Server error","bot");
 });
}

/* ===== QUICK BUTTON ===== */
function quick(t){
 input.value=t;
 send();
}

/* ===== SIMPLE SUGGEST ===== */
input.addEventListener("input",function(){
 var value=this.value.toLowerCase();
 suggestions.innerHTML="";

 if(value===""){
  suggestions.style.display="none";
  return;
 }

 var list=[];
 for(var i=0;i<commands.length;i++){
  if(commands[i].indexOf(value)!==-1){
   list.push(commands[i]);
  }
 }

 if(list.length===0){
  suggestions.style.display="none";
  return;
 }

 for(var j=0;j<list.length;j++){
  var div=document.createElement("div");
  div.className="suggest-item";
  div.innerText=list[j];
  div.onclick=function(){
   input.value=this.innerText;
   suggestions.style.display="none";
   input.focus();
  };
  suggestions.appendChild(div);
 }

 suggestions.style.display="block";
});
</script>

</body>
</html>
